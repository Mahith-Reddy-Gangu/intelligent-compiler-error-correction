<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hybrid AI-Assisted Compiler IDE</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>
<body>
    <div class="topbar">
        <div class="titleblock">
            <h2>Hybrid AI-Assisted Compiler IDE</h2>
            <div class="subtitle">Syntax + Semantic + Security repair workspace</div>
        </div>

        <div class="controls">
            <button onclick="runRepair()">Run Current File</button>
            <button onclick="newFile()">New File</button>
            <button onclick="refreshExamples()">Refresh Files</button>
        </div>
    </div>

    <div class="workspace">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>Project Files</span>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Examples</div>
                <div id="file-tree" class="file-tree"></div>
            </div>
        </aside>

        <div class="resizer vertical-resizer" id="sidebar-resizer"></div>

        <main class="mainpanel">
            <div class="tabbar" id="tabbar"></div>

            <div class="top-section" id="top-section">
                <div class="editor-and-side">
                    <section class="editorpanel" id="editorpanel">
                        <div class="editor-toolbar">
                            <span id="active-file-label">main.c</span>
                        </div>
                        <div id="editor"></div>
                    </section>

                    <div class="resizer vertical-resizer" id="rightpanel-resizer"></div>

                    <section class="resultpanel" id="resultpanel">
                        <section class="panelcard">
                            <h3>Status</h3>
                            <div id="status">Idle</div>
                        </section>

                        <section class="panelcard">
                            <h3>Repair Progress</h3>
                            <div class="progress-wrap">
                                <div id="repairProgressBar" class="progress-bar"></div>
                            </div>
                            <div id="repairProgressText" class="progress-text">Idle</div>
                        </section>

                        <section class="panelcard">
                            <h3>Stats</h3>
                            <div id="stats"></div>
                        </section>

                        <section class="panelcard">
                            <h3>Repair Steps</h3>
                            <ul id="steps"></ul>
                        </section>

                        <section class="panelcard">
                            <h3>Errors</h3>
                            <ul id="errors"></ul>
                        </section>

                        <section class="panelcard">
                            <h3>Semantic Issues</h3>
                            <ul id="semantic"></ul>
                        </section>

                        <section class="panelcard">
                            <h3>Security Warnings</h3>
                            <ul id="security"></ul>
                        </section>

                        <section class="panelcard">
                            <h3>Logs</h3>
                            <ul id="logs"></ul>
                        </section>
                    </section>
                </div>
            </div>

            <div class="resizer horizontal-resizer" id="bottom-resizer"></div>

            <section class="testcase-panel" id="testcase-panel">
                <div class="testcase-header">
                    <h3>Test Case Runner</h3>
                    <button onclick="runTestCase()">Run Test Case</button>
                </div>

                <div class="testcase-grid" id="testcase-grid">
                    <div class="testcase-box" id="testcase-input-box">
                        <label for="testcase-input">Input / Test Code</label>
                        <textarea id="testcase-input" spellcheck="false"></textarea>
                    </div>

                    <div class="resizer vertical-resizer" id="testcase-resizer"></div>

                    <div class="testcase-box" id="testcase-output-box">
                        <label for="testcase-output">Output</label>
                        <textarea id="testcase-output" readonly spellcheck="false"></textarea>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
